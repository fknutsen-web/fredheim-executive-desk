<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Trovant Talent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f7f4"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Soft emerald accent shapes -->
  <circle cx="1120" cy="120" r="220" fill="#10b981" fill-opacity="0.08"/>
  <circle cx="1040" cy="560" r="160" fill="#0d9488" fill-opacity="0.07"/>

  <!-- Brand mark: rounded emerald "T" tile -->
  <g transform="translate(120 150)">
    <rect width="120" height="120" rx="30" fill="url(#tile)"/>
    <path d="M34 44 H86 M60 44 V92" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
    <circle cx="79" cy="82" r="7.5" fill="#a7f3d0"/>
  </g>

  <!-- Wordmark -->
  <text x="270" y="208" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="92" font-weight="700" letter-spacing="-3" fill="#0b1220">Trovant</text>
  <text x="272" y="262" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="600" letter-spacing="2" fill="#0e9f6e">Talent</text>

  <!-- Tagline -->
  <text x="122" y="372" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="-1.5" fill="#0b1220">Where talent meets opportunity.</text>
  <text x="124" y="430" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="27" fill="#5b6b85">The confidential talent marketplace for maritime, energy,</text>
  <text x="124" y="466" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="27" fill="#5b6b85">logistics and industrial professionals.</text>

  <!-- Pills -->
  <g font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="124" y="516" width="150" height="44" rx="22" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="199" y="544" text-anchor="middle" fill="#0e9f6e">Maritime</text>
    <rect x="288" y="516" width="130" height="44" rx="22" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="353" y="544" text-anchor="middle" fill="#0e9f6e">Energy</text>
    <rect x="432" y="516" width="150" height="44" rx="22" fill="#ecfdf5" stroke="#a7f3d0"/>
    <text x="507" y="544" text-anchor="middle" fill="#0e9f6e">Logistics</text>
  </g>

  <text x="1080" y="600" text-anchor="end" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="1" fill="#0e9f6e">trovanttalent.com</text>
</svg>
