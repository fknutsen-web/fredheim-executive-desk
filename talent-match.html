<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Executive Match — Fredheim Desk</title>
<meta name="description" content="Executive Match — the confidential candidate assessment that powers scope-based matching on Fredheim Desk." />
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Figtree:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --paper:    #fafaf8;
  --paper-2:  #f4f3f0;
  --paper-3:  #eceae4;
  --ink:      #0f1c2e;
  --ink-2:    #2d3f55;
  --ink-3:    #5a6e85;
  --ink-4:    #8fa0b4;
  --rule:     #ddd9d0;
  --rule-lt:  #eceae4;
  --gold:     #b8922a;
  --gold-lt:  #d4a93c;
  --gold-bg:  #fdf8ee;
  --gold-rule:#e8d5a0;
  --white:    #ffffff;
  --green:    #1a7a4a;
  --green-bg: #edf7f2;
  --red:      #c0392b;
  --navy:     #0f1c2e;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Figtree', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── NAV ── */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(250,250,248,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--rule);
  padding: 0 3rem; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-brand { display: flex; align-items: center; gap: 1rem; cursor: pointer; text-decoration: none; }
.nav-mark {
  width: 38px; height: 38px;
  border: 1.5px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 700; color: var(--ink);
  letter-spacing: 0.03em; position: relative;
}
.nav-mark::after {
  content: ''; position: absolute; inset: 3px;
  border: 1px solid var(--gold); opacity: 0.4;
}
.nav-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--ink); }
.nav-sub { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--ink-4); letter-spacing: 0.18em; text-transform: uppercase; display: block; }
.nav-back {
  background: none; border: 1px solid var(--rule); color: var(--ink-3);
  font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em;
  text-transform: uppercase; padding: 0.4rem 0.9rem; cursor: pointer; transition: all 0.2s;
}
.nav-back:hover { border-color: var(--ink-3); color: var(--ink); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  padding: 1.5rem 3rem 0;
}
.progress-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 0.875rem;
}
.progress-label { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); }
.progress-pct { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold); }
.progress-track {
  height: 2px; background: var(--rule);
  position: relative; overflow: visible;
}
.progress-fill {
  height: 2px; background: var(--gold);
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.progress-fill::after {
  content: ''; position: absolute; right: -4px; top: -3px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); border: 2px solid var(--white);
}
.section-tabs {
  display: flex; gap: 0; margin-top: 1rem;
}
.section-tab {
  flex: 1; padding: 0.5rem 0.5rem 0.625rem;
  font-family: 'DM Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-4); text-align: center; cursor: default;
  border-bottom: 2px solid transparent;
  transition: all 0.3s;
}
.section-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.section-tab.done { color: var(--green); border-bottom-color: var(--green-bg); }

/* ── MAIN LAYOUT ── */
.main { max-width: 760px; margin: 0 auto; padding: 3.5rem 2rem 6rem; }

/* ── SECTION HEADER ── */
.section-eyebrow {
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 0.5rem;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.75rem; font-weight: 600; color: var(--ink);
  line-height: 1.25; margin-bottom: 0.75rem;
}
.section-desc { color: var(--ink-3); font-size: 0.9rem; line-height: 1.6; margin-bottom: 2.5rem; }

/* ── QUESTION CARD ── */
.question-card {
  background: var(--white);
  border: 1px solid var(--rule);
  padding: 1.75rem 2rem;
  margin-bottom: 1.25rem;
  transition: border-color 0.2s;
}
.question-card:hover { border-color: var(--rule); }
.question-card.answered { border-left: 3px solid var(--gold); }

.q-number {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--ink-4); margin-bottom: 0.625rem;
}
.q-text {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 500; color: var(--ink);
  line-height: 1.4; margin-bottom: 1.25rem;
}
.q-options { display: flex; flex-direction: column; gap: 0.5rem; }

.q-option {
  display: flex; align-items: flex-start; gap: 0.875rem;
  padding: 0.75rem 1rem; cursor: pointer;
  border: 1px solid var(--rule-lt);
  background: var(--paper);
  transition: all 0.18s;
  user-select: none;
}
.q-option:hover { background: var(--gold-bg); border-color: var(--gold-rule); }
.q-option.selected {
  background: var(--gold-bg); border-color: var(--gold);
}
.q-option-key {
  font-family: 'DM Mono', monospace; font-size: 0.7rem;
  font-weight: 500; color: var(--gold); flex-shrink: 0;
  width: 18px; padding-top: 1px;
}
.q-option.selected .q-option-key { color: var(--gold); }
.q-option-text { font-size: 0.875rem; color: var(--ink-2); line-height: 1.45; }

/* ── IDENTITY FORM ── */
.identity-form { display: flex; flex-direction: column; gap: 1.25rem; margin-bottom: 2.5rem; }
.field-group { display: flex; flex-direction: column; gap: 0.375rem; }
.field-label {
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3);
}
.field-input {
  background: var(--white); border: 1px solid var(--rule);
  padding: 0.75rem 1rem; font-family: 'Figtree', sans-serif;
  font-size: 0.9rem; color: var(--ink); outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.field-input:focus { border-color: var(--gold); }
.field-input::placeholder { color: var(--ink-4); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* ── PIVOT / INTENT SECTION ── */
.pivot-card {
  background: var(--gold-bg); border: 1px solid var(--gold-rule);
  padding: 1.5rem 2rem; margin-bottom: 2rem;
}
.pivot-label {
  font-family: 'DM Mono', monospace; font-size: 0.62rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 0.5rem;
}
.pivot-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 500; color: var(--ink);
  margin-bottom: 1rem;
}
.pivot-options { display: flex; flex-direction: column; gap: 0.5rem; }
.pivot-option {
  display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.625rem 0.875rem; cursor: pointer;
  border: 1px solid var(--gold-rule); background: var(--white);
  transition: all 0.18s;
}
.pivot-option:hover { border-color: var(--gold); }
.pivot-option.selected { border-color: var(--gold); background: var(--white); }
.pivot-option-key {
  font-family: 'DM Mono', monospace; font-size: 0.7rem;
  color: var(--gold); flex-shrink: 0; width: 18px;
}
.pivot-option-text { font-size: 0.875rem; color: var(--ink-2); }

/* ── STATUS SECTION ── */
.status-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.875rem; margin-bottom: 2rem; }
.status-card {
  padding: 1.25rem; border: 1px solid var(--rule);
  background: var(--white); cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.status-card:hover { border-color: var(--ink-3); }
.status-card.selected { border-color: var(--gold); background: var(--gold-bg); }
.status-icon { font-size: 1.25rem; margin-bottom: 0.5rem; }
.status-label {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3);
  display: block; margin-bottom: 0.25rem;
}
.status-card.selected .status-label { color: var(--gold); }
.status-desc { font-size: 0.78rem; color: var(--ink-4); line-height: 1.35; }

/* ── NAVIGATION BUTTONS ── */
.nav-buttons {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 2.5rem; padding-top: 2rem;
  border-top: 1px solid var(--rule);
}
.btn-prev {
  background: none; border: 1px solid var(--rule); color: var(--ink-3);
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.7rem 1.5rem; cursor: pointer; transition: all 0.2s;
}
.btn-prev:hover { border-color: var(--ink-3); color: var(--ink); }
.btn-next {
  background: var(--ink); color: var(--white); border: none;
  font-family: 'Figtree', sans-serif; font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.06em; padding: 0.85rem 2.5rem;
  cursor: pointer; transition: all 0.2s;
}
.btn-next:hover { background: var(--ink-2); }
.btn-next:disabled { background: var(--ink-4); cursor: not-allowed; }
.btn-submit {
  background: var(--gold); color: var(--white); border: none;
  font-family: 'Figtree', sans-serif; font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.06em; padding: 0.85rem 2.5rem;
  cursor: pointer; transition: all 0.2s;
}
.btn-submit:hover { background: var(--gold-lt); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

.q-counter {
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  color: var(--ink-4); letter-spacing: 0.08em;
}

/* ── SUCCESS STATE ── */
.success-wrap {
  max-width: 580px; margin: 5rem auto; text-align: center; padding: 0 2rem;
}
.success-mark {
  width: 72px; height: 72px;
  border: 2px solid var(--gold);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem; margin: 0 auto 2rem;
}
.success-title {
  font-family: 'Playfair Display', serif;
  font-size: 2rem; font-weight: 600; color: var(--ink);
  margin-bottom: 1rem;
}
.success-desc { color: var(--ink-3); font-size: 0.9rem; line-height: 1.7; margin-bottom: 2rem; }
.success-detail {
  background: var(--white); border: 1px solid var(--rule);
  padding: 1.5rem; margin-bottom: 2rem; text-align: left;
}
.score-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.5rem 0; border-bottom: 1px solid var(--rule-lt);
}
.score-row:last-child { border-bottom: none; }
.score-label { font-size: 0.82rem; color: var(--ink-3); }
.score-value { font-family: 'DM Mono', monospace; font-size: 0.9rem; color: var(--gold); font-weight: 500; }
.score-composite {
  font-family: 'Playfair Display', serif; font-size: 2rem;
  color: var(--gold); text-align: center; margin: 1rem 0 0.25rem;
}
.score-composite-label {
  font-family: 'DM Mono', monospace; font-size: 0.6rem;
  letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink-4); text-align: center;
}
.badge-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin: 1rem 0; }
.badge {
  font-family: 'DM Mono', monospace; font-size: 0.58rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.25rem 0.625rem; border: 1px solid;
}
.badge-gold { color: var(--gold); border-color: var(--gold-rule); background: var(--gold-bg); }
.badge-green { color: var(--green); border-color: #b2dfc6; background: var(--green-bg); }
.badge-blue { color: var(--ink-2); border-color: #b0c4d8; background: #eef2f7; }

/* ── CONFIRM PAGE ── */
.confirm-wrap {
  max-width: 520px; margin: 5rem auto; text-align: center; padding: 0 2rem;
}
.confirm-icon { font-size: 3rem; margin-bottom: 1.5rem; }
.confirm-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; color: var(--ink); margin-bottom: 1rem; }
.confirm-desc { color: var(--ink-3); font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; }
.confirm-btn {
  background: var(--green); color: var(--white); border: none;
  font-family: 'Figtree', sans-serif; font-size: 0.9rem; font-weight: 600;
  padding: 0.85rem 2rem; cursor: pointer; transition: background 0.2s;
  margin-bottom: 0.75rem; width: 100%;
}
.confirm-btn:hover { background: #156038; }
.pause-btn {
  background: none; border: 1px solid var(--rule); color: var(--ink-3);
  font-family: 'Figtree', sans-serif; font-size: 0.85rem;
  padding: 0.75rem 2rem; cursor: pointer; transition: all 0.2s; width: 100%;
}
.pause-btn:hover { border-color: var(--ink-3); }

/* ── LOADING ── */
.loading-wrap { text-align: center; padding: 5rem 2rem; }
.spinner { display: inline-block; width: 32px; height: 32px; border: 2px solid var(--rule); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-4); margin-top: 1rem; }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .nav { padding: 0 1.25rem; }
  .progress-wrap { padding: 1.25rem 1.25rem 0; }
  .main { padding: 2rem 1.25rem 5rem; }
  .section-title { font-size: 1.35rem; }
  .question-card { padding: 1.25rem 1.25rem; }
  .field-row { grid-template-columns: 1fr; }
  .status-cards { grid-template-columns: 1fr; }
  .section-tab { font-size: 0.52rem; }
}
</style>
</head>
<body>
<div id="root"></div>

<script type="module" src="/src/talent-match.jsx"></script>
</body>
</html>
